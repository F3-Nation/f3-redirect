name: CI

on:
  push:
  pull_request:

jobs:
  go:
    name: Go checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Test + coverage gate
        run: bash scripts/coverage.sh
        env:
          COVER_THRESHOLD: "70"

      - name: Build
        run: go build ./...

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image (no push)
        run: docker build --provenance=false --sbom=false -t redirectd:ci .
